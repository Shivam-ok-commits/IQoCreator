[alembic]
# Path to the Alembic migration environment
script_location = alembic

# Template for migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend
prepend_sys_path = .

# Database URL - uses the sync URL from settings
# Override with: alembic -x db_url=postgresql://user:pass@localhost/db upgrade head
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
